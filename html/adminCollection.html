<!-- ADMIN — COLLECTION PAR JOUEUR -->
<div class="page-header">
  <div>
    <div class="page-title">🔍 Collection d'un joueur</div>
    <div class="page-subtitle">Tape un pseudo Twitch pour voir sa collection</div>
  </div>
</div>

<!-- Barre de recherche -->
<div style="display:flex;gap:10px;margin-bottom:24px;max-width:500px;">
  <input
    id="searchInput"
    type="text"
    placeholder="Pseudo Twitch..."
    style="
      flex:1; background:var(--glass); border:1px solid var(--glass-border);
      border-radius:50px; padding:10px 18px; color:var(--text);
      font-size:14px; outline:none; backdrop-filter:blur(10px);
    "
    oninput="searchUser(this.value)"
  >
</div>

<!-- Suggestions -->
<div id="suggestions" style="margin-bottom:20px;display:flex;flex-wrap:wrap;gap:8px;"></div>

<!-- Collection du joueur sélectionné -->
<div id="adminCollectionContent"></div>

<script>
if (!isAdmin) {
  document.getElementById('adminCollectionContent').innerHTML = `
    <div class="empty-state"><div class="icon">🚫</div><p>Accès refusé.</p></div>`;
}

let _allUsers    = null;
let _searchTimer = null;

// Charge tous les users au démarrage
(async function () {
  if (!isAdmin) return;
  _allUsers = await sbFetch('users?select=twitch_id,twitch_name,nbrpacks&order=twitch_name.asc');
})();

function searchUser(query) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    const q = query.trim().toLowerCase();
    const suggestionsEl = document.getElementById('suggestions');

    if (!q || !_allUsers) {
      suggestionsEl.innerHTML = '';
      return;
    }

    const matches = _allUsers.filter(u =>
      u.twitch_name?.toLowerCase().includes(q)
    ).slice(0, 8);

    suggestionsEl.innerHTML = matches.map(u => `
      <button class="filter-chip" onclick="loadUserCollection(${u.twitch_id}, '${u.twitch_name}')">
        ${u.twitch_name}
        <span style="color:var(--text-muted);font-size:10px;margin-left:4px">${u.nbrpacks} packs</span>
      </button>
    `).join('');

    window.loadUserCollection = loadUserCollection;
  }, 200);
}

async function loadUserCollection(twitchId, twitchName) {
  const content = document.getElementById('adminCollectionContent');
  document.getElementById('searchInput').value = twitchName;
  document.getElementById('suggestions').innerHTML = '';

  content.innerHTML = '<div class="loading-cards"><div class="spinner"></div></div>';

  const [allCartes, collection, dessinMap] = await Promise.all([
    sbFetch('carte?select=*&order=scoville.asc'),
    sbFetch(`collection?twitch_id=eq.${twitchId}&select=*,carte(*),carteversion(*)&order=obtained_at.desc`),
    getDessinMap(),
  ]);

  if (!collection) {
    content.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Erreur de chargement.</p></div>`;
    return;
  }

  const VERSION_ORDER = ['vert','jaune','rouge','noir'];
  const VERSION_INFO  = {
    vert:  { emoji:'🟢', label:'Vert',  color:'#00e676', bg:'#0d2d1a', glow:'rgba(0,230,118,0.3)'  },
    jaune: { emoji:'🟡', label:'Jaune', color:'#ffd700', bg:'#2d2600', glow:'rgba(255,215,0,0.3)'  },
    rouge: { emoji:'🔴', label:'Rouge', color:'#ff1744', bg:'#2d0a0a', glow:'rgba(255,23,68,0.35)' },
    noir:  { emoji:'⚫', label:'Noir',  color:'#e0e0e0', bg:'#0a0a12', glow:'rgba(220,220,220,0.6)'},
  };

  // Map collection par carte_id
  const ownedMap = {};
  collection.forEach(item => {
    const cid = item.carte_id;
    if (!ownedMap[cid]) ownedMap[cid] = { vert:null, jaune:null, rouge:null, noir:null };
    ownedMap[cid][item.carteversion.color] = item;
  });

  const total   = collection.reduce((s,i) => s + i.quantity, 0);
  const unique  = collection.length;

  content.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
      <div class="page-title" style="font-size:20px">${twitchName}</div>
      <span class="stat-pill">${total} cartes</span>
      <span class="stat-pill">${unique} / 120 uniques</span>
    </div>
    <div class="cards-grid-slots">
      ${(allCartes || []).map((carte, i) => {
        const owned   = ownedMap[carte.id] || { vert:null,jaune:null,rouge:null,noir:null };
        const hasAny  = VERSION_ORDER.some(c => owned[c] !== null);
        const defColor = [...VERSION_ORDER].reverse().find(c => owned[c] !== null) || 'vert';
        const vi       = VERSION_INFO[defColor];
        const item     = owned[defColor];
        const image    = hasAny && item ? (dessinMap[`${carte.id}_${item.carteversion_id}`] || carte.image_url || '') : '';

        const borderColor = !hasAny ? 'rgba(255,255,255,0.07)' : vi.color;
        const bgColor     = !hasAny ? '#080810' : vi.bg;
        const glowStyle   = hasAny  ? `box-shadow:0 0 14px ${vi.glow}` : '';

        const btns = VERSION_ORDER.map(color => {
          const vInfo    = VERSION_INFO[color];
          const hasColor = owned[color] !== null;
          return `<div style="
            width:14px;height:14px;border-radius:50%;flex-shrink:0;
            background:${hasColor ? vInfo.color : 'rgba(255,255,255,0.1)'};
            opacity:${hasColor ? 1 : 0.2};
          "></div>`;
        }).join('');

        return `
          <div style="border:2px solid ${borderColor};background:${bgColor};${glowStyle};
                      border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;">
            <div style="width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;
                        background:rgba(0,0,0,0.3);overflow:hidden;position:relative;">
              ${image
                ? `<img src="${image}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">`
                : `<div style="font-size:32px;font-weight:900;color:rgba(255,255,255,0.08)">?</div>`}
            </div>
            <div style="padding:8px 10px 4px;display:flex;flex-direction:column;gap:2px;">
              <span style="font-size:11px;font-weight:700;color:var(--text)">${hasAny ? carte.name : '???'}</span>
              <span style="font-size:10px;color:var(--text-muted)">${carte.scoville.toLocaleString('fr-FR')} SHU</span>
            </div>
            <div style="display:flex;gap:5px;padding:5px 10px 10px;justify-content:center;">
              ${btns}
            </div>
          </div>`;
      }).join('')}
    </div>
  `;
}

window.searchUser          = searchUser;
window.loadUserCollection  = loadUserCollection;
</script>
