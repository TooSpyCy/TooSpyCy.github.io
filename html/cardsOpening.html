<!-- OUVERTURE DE PACKS -->
<style>
.opening-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 75vh;
  gap: 20px;
}

/* ── Pack fermé ─────────────────────────────────────────── */
.pack-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  min-height: 75vh;
  width: 100%;
}

.pack-big {
  position: relative;
  cursor: pointer;
  width: 240px;
  height: 330px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.pack-big:hover { transform: scale(1.06) translateY(-8px); }
.pack-big:hover .pack-glow { opacity: 1; }

.pack-glow {
  position: absolute; inset: -40px;
  background: radial-gradient(circle, rgba(255,77,141,0.5) 0%, transparent 70%);
  border-radius: 50%;
  opacity: 0.6;
  pointer-events: none;
  animation: pulseGlow 2.2s ease-in-out infinite;
}
@keyframes pulseGlow {
  0%,100% { transform: scale(1);   opacity: 0.55; }
  50%      { transform: scale(1.15); opacity: 0.85; }
}

.pack-click-label {
  font-size: 15px; color: var(--text-sub); font-weight: 600;
  letter-spacing: 0.08em;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

@keyframes packBurst {
  0%   { transform: scale(1)   rotate(0deg);  opacity: 1; }
  40%  { transform: scale(1.4) rotate(-8deg); opacity: 1; }
  100% { transform: scale(0)   rotate(15deg); opacity: 0; }
}
.pack-bursting { animation: packBurst 0.55s ease-in forwards; pointer-events: none; }

/* ── Particules ─────────────────────────────────────────── */
.particles-container {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 999; overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particleFly 1.2s ease-out forwards;
}
@keyframes particleFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx),var(--ty)) scale(0); opacity: 0; }
}

/* ── Stack de cartes ────────────────────────────────────── */
.card-stack-wrapper {
  position: relative;
  width: 200px;
  height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Les cartes "derrière" visibles comme des bords */
.stack-shadow {
  position: absolute;
  width: 200px; height: 280px;
  border-radius: 14px;
  border: 2px solid rgba(255,77,141,0.2);
  background: rgba(26,14,42,0.8);
}
.stack-shadow:nth-child(1) { transform: translateY(8px)  rotate(2deg);  z-index: 1; opacity: 0.5; }
.stack-shadow:nth-child(2) { transform: translateY(4px)  rotate(-1deg); z-index: 2; opacity: 0.7; }

/* La carte active (top du stack) */
.stack-top-card {
  position: absolute;
  width: 200px; height: 280px;
  z-index: 10;
  perspective: 900px;
  cursor: pointer;
}
.stack-top-card:hover:not(.is-flipping) { transform: translateY(-6px) scale(1.03); }
.stack-top-card { transition: transform 0.2s ease; }

.stack-card-inner {
  position: relative;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  border-radius: 14px;
}
.stack-top-card.is-flipping .stack-card-inner {
  animation: flipReveal 0.7s cubic-bezier(0.34,1.2,0.64,1) forwards;
}
@keyframes flipReveal {
  0%   { transform: rotateY(0deg)   translateX(0px);   }
  40%  { transform: rotateY(90deg)  translateX(0px);   }
  60%  { transform: rotateY(270deg) translateX(0px);   }
  100% { transform: rotateY(360deg) translateX(600px); opacity: 0; }
}

.stack-face {
  position: absolute; inset: 0;
  border-radius: 14px;
  backface-visibility: hidden;
  overflow: hidden;
}

.stack-front {
  background: linear-gradient(135deg, #1a0e2a, #0c0814);
  border: 2px solid var(--pink);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255,77,141,0.2);
}
.stack-front .back-logo  { font-size: 56px; }
.stack-front .back-label {
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.2em; color: var(--pink-light); text-transform: uppercase;
}

/* Cartes révélées en bas ────────────────────────────────── */
.revealed-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 700px;
}

.revealed-mini {
  width: 90px; height: 126px;
  border-radius: 8px;
  border: 2px solid var(--card-border, #444);
  background: var(--card-bg, #111);
  overflow: hidden;
  display: flex; flex-direction: column;
  animation: slideInBottom 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow: 0 0 12px var(--card-glow, transparent);
}
@keyframes slideInBottom {
  from { opacity: 0; transform: translateY(30px) scale(0.8); }
  to   { opacity: 1; transform: none; }
}
.revealed-mini .mini-img {
  flex: 1; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.3);
}
.revealed-mini .mini-img img { width:100%; height:100%; object-fit:cover; }
.revealed-mini .mini-img .pepper-svg { width:80%; height:80%; }
.revealed-mini .mini-info {
  padding: 4px 5px;
  background: rgba(0,0,0,0.7);
  font-size: 9px; line-height: 1.3;
  display: flex; flex-direction: column; gap: 1px;
}
.revealed-mini .mini-name { font-weight: 700; color: var(--text); }
.revealed-mini .mini-ver  { font-weight: 600; }

/* Glows par couleur sur reveal */
@keyframes glow-vert  { 0%,100%{box-shadow:0 0 12px rgba(0,230,118,0.4)} 50%{box-shadow:0 0 50px rgba(0,230,118,1)} }
@keyframes glow-jaune { 0%,100%{box-shadow:0 0 12px rgba(255,215,0,0.4)} 50%{box-shadow:0 0 50px rgba(255,215,0,1)} }
@keyframes glow-rouge { 0%,100%{box-shadow:0 0 15px rgba(255,23,68,0.4)} 50%{box-shadow:0 0 60px rgba(255,23,68,1)} }
@keyframes glow-noir  { 0%,100%{box-shadow:0 0 20px rgba(220,220,220,0.3)} 50%{box-shadow:0 0 80px rgba(220,220,220,1)} }

/* Compteur ─────────────────────────────────────────────── */
.stack-counter {
  font-size: 13px; color: var(--text-muted); font-weight: 600;
  letter-spacing: 0.05em;
}

/* Vide / loading ────────────────────────────────────────── */
.no-packs-stage {
  text-align: center; padding: 60px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
</style>

<!-- Vue pack direct -->
<div id="packStage" class="pack-stage">
  <div class="loading-cards"><div class="spinner"></div></div>
</div>

<!-- Particules -->
<div class="particles-container" id="particlesContainer"></div>

<script>
const RARITY_ORDER = { vert: 0, jaune: 1, rouge: 2, noir: 3 };
const V_STYLES = {
  vert:  { bg:'#0d2d1a', border:'#00e676', glow:'rgba(0,230,118,0.5)',   label:'🟢 Vert'  },
  jaune: { bg:'#2d2600', border:'#ffd700', glow:'rgba(255,215,0,0.5)',   label:'🟡 Jaune' },
  rouge: { bg:'#2d0a0a', border:'#ff1744', glow:'rgba(255,23,68,0.6)',   label:'🔴 Rouge' },
  noir:  { bg:'#0a0a12', border:'#e0e0e0', glow:'rgba(220,220,220,0.7)', label:'⚫ Noir'  },
};

let _sortedCards  = [];
let _currentIndex = 0;
let _revealed     = [];
let _isFlipping   = false;
let _drawnPromise = null;

(async function () {
  const count = currentProfile?.nbrpacks || 0;
  if (!currentTwitchId || count <= 0) {
    showNoPacks(count);
    return;
  }
  // Lance le tirage immédiatement en arrière-plan
  _drawnPromise = openPack();
  showBigPack(count);
})();

function showNoPacks(count) {
  document.getElementById('packStage').innerHTML = `
    <div class="no-packs-stage">
      <div style="font-size:52px">${currentTwitchId ? '📭' : '🔒'}</div>
      <p style="font-size:15px;color:var(--text-sub)">
        ${currentTwitchId ? 'Aucun pack disponible.<br><small style="font-size:12px;color:var(--text-muted)">Les packs s\'obtiennent via les points de chaîne Twitch !</small>' : 'Connecte-toi avec Twitch !'}
      </p>
    </div>`;
}

function showBigPack(count) {
  document.getElementById('packStage').innerHTML = `
    <div class="pack-big" id="bigPack" onclick="triggerPackOpen()">
      <div class="pack-glow"></div>
      <svg viewBox="0 0 240 330" xmlns="http://www.w3.org/2000/svg" width="240" height="330"
           style="filter:drop-shadow(0 20px 50px rgba(255,77,141,0.5))">
        <defs>
          <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#2d0a2e"/>
            <stop offset="50%"  stop-color="#1a0630"/>
            <stop offset="100%" stop-color="#0c0814"/>
          </linearGradient>
          <linearGradient id="pe" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#ff4d8d"/>
            <stop offset="50%"  stop-color="#b039d4"/>
            <stop offset="100%" stop-color="#ff4d8d"/>
          </linearGradient>
          <filter id="gf"><feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <rect x="6" y="6" width="228" height="318" rx="20" fill="url(#pg)" stroke="url(#pe)" stroke-width="3.5"/>
        <rect x="6" y="6" width="228" height="90" rx="20" fill="rgba(255,255,255,0.04)"/>
        <path d="M6 138 Q60 126 120 142 Q180 158 234 138 L234 182 Q180 198 120 182 Q60 166 6 182 Z"
              fill="rgba(255,77,141,0.10)" stroke="rgba(255,77,141,0.25)" stroke-width="1"/>
        <text x="120" y="128" text-anchor="middle" font-size="72" filter="url(#gf)">🌶️</text>
        <text x="120" y="192" text-anchor="middle" font-family="'Segoe UI',sans-serif"
              font-size="20" font-weight="900" fill="#ff80ab" letter-spacing="2">TooSpycy</text>
        <text x="120" y="216" text-anchor="middle" font-family="'Segoe UI',sans-serif"
              font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="2">PACK SPYCY</text>
        <circle cx="32"  cy="32"  r="9" fill="none" stroke="rgba(255,77,141,0.4)" stroke-width="1.5"/>
        <circle cx="208" cy="32"  r="9" fill="none" stroke="rgba(255,77,141,0.4)" stroke-width="1.5"/>
        <circle cx="32"  cy="298" r="9" fill="none" stroke="rgba(255,77,141,0.4)" stroke-width="1.5"/>
        <circle cx="208" cy="298" r="9" fill="none" stroke="rgba(255,77,141,0.4)" stroke-width="1.5"/>
        <line x1="18" y1="56" x2="222" y2="56" stroke="rgba(255,77,141,0.12)" stroke-width="1"/>
        <line x1="18" y1="274" x2="222" y2="274" stroke="rgba(255,77,141,0.12)" stroke-width="1"/>
      </svg>
    </div>
    <div class="pack-click-label">✨ Cliquer pour ouvrir ✨</div>
    <div style="font-size:12px;color:var(--text-muted)">${count} pack${count>1?'s':''} disponible${count>1?'s':''}</div>
  `;
}

async function triggerPackOpen() {
  const pack = document.getElementById('bigPack');
  if (!pack) return;
  pack.style.pointerEvents = 'none';
  pack.classList.add('pack-bursting');
  spawnParticles();

  // Attend que le tirage soit prêt
  const drawn = await _drawnPromise;

  if (!drawn || !drawn.length) {
    setTimeout(() => {
      document.getElementById('packStage').innerHTML = `
        <div class="no-packs-stage">
          <div style="font-size:52px">⚠️</div>
          <p style="color:var(--text-sub)">Erreur lors de l'ouverture.</p>
          <button class="btn-pink" onclick="setNewHTML('cardsOpening')">Réessayer</button>
        </div>`;
    }, 600);
    return;
  }

  // Trie du moins rare au plus rare
  _sortedCards  = [...drawn].sort((a,b) => RARITY_ORDER[a.version.color] - RARITY_ORDER[b.version.color]);
  _currentIndex = 0;
  _revealed     = [];
  _isFlipping   = false;

  const dessinMap = await getDessinMap();
  // Stocke l'image pour chaque carte
  _sortedCards = _sortedCards.map(d => ({
    ...d,
    image: dessinMap[`${d.carte.id}_${d.version.id}`] || d.carte.image_url || ''
  }));

  setTimeout(() => showStackView(), 650);
}

function showStackView() {
  renderStackView();
}

function renderStackView() {
  const remaining = _sortedCards.length - _currentIndex;

  const shadowsHTML = remaining > 1
    ? `<div class="stack-shadow"></div><div class="stack-shadow"></div>`
    : remaining === 1 ? `<div class="stack-shadow"></div>` : '';

  const topCard = _sortedCards[_currentIndex];

  const stackHTML = remaining > 0 ? `
    <div class="card-stack-wrapper">
      ${shadowsHTML}
      <div class="stack-top-card" id="stackTopCard" onclick="revealTopCard()">
        <div class="stack-card-inner">
          <div class="stack-face stack-front">
            <div class="back-logo">🌶️</div>
            <div class="back-label">TooSpycy</div>
          </div>
        </div>
      </div>
    </div>
    <div class="stack-counter">${remaining} carte${remaining>1?'s':''} restante${remaining>1?'s':''} — clique pour révéler</div>
  ` : `
    <div style="font-size:36px">🎉</div>
    <div style="font-size:16px;font-weight:700;color:var(--pink-light)">Toutes les cartes révélées !</div>
    <button class="btn-outline" style="margin-top:8px" onclick="returnToPacks()">← Retour</button>
  `;

  const revealedHTML = _revealed.length > 0 ? `
    <div class="revealed-row">
      ${_revealed.map(d => {
        const s = V_STYLES[d.version.color];
        return `
          <div class="revealed-mini"
               style="--card-border:${s.border};--card-bg:${d.version.color==='noir'?'#0a0a12':s.bg};--card-glow:${s.glow};
                      border-color:${s.border};background:${s.bg};box-shadow:0 0 10px ${s.glow};">
            <div class="mini-img">
              ${d.image ? `<img src="${d.image}" alt="${d.carte.name}">` : pepperSVG(d.version.color, d.carte.scoville)}
            </div>
            <div class="mini-info">
              <span class="mini-name">${d.carte.name}</span>
              <span class="mini-ver" style="color:${s.border}">${d.version.emoji} ${d.version.label}</span>
            </div>
          </div>`;
      }).join('')}
    </div>
  ` : '';

  document.getElementById('packStage').innerHTML = `
    ${stackHTML}
    ${revealedHTML}
  `;
}

function revealTopCard() {
  if (_isFlipping) return;
  const cardEl = document.getElementById('stackTopCard');
  if (!cardEl) return;

  _isFlipping = true;
  cardEl.classList.add('is-flipping');
  cardEl.style.pointerEvents = 'none';

  const card = _sortedCards[_currentIndex];
  const s    = V_STYLES[card.version.color];

  // Glow flash
  const glow = document.createElement('div');
  glow.style.cssText = `
    position:fixed;inset:0;pointer-events:none;z-index:998;
    background:radial-gradient(circle at center, ${s.glow} 0%, transparent 60%);
    animation:fadeOut 0.8s 0.3s forwards;
  `;
  const style = document.createElement('style');
  style.textContent = `@keyframes fadeOut{from{opacity:1}to{opacity:0}}`;
  document.head.appendChild(style);
  document.body.appendChild(glow);
  setTimeout(() => { glow.remove(); style.remove(); }, 1200);

  // Vibration
  if (navigator.vibrate) {
    if (card.version.color === 'noir')  navigator.vibrate([80,40,80,40,200]);
    else if (card.version.color === 'rouge') navigator.vibrate([60,30,100]);
    else navigator.vibrate(30);
  }

  setTimeout(() => {
    _revealed.push(card);
    _currentIndex++;
    _isFlipping = false;
    renderStackView();
  }, 700);
}

function spawnParticles() {
  const container = document.getElementById('particlesContainer');
  const colors = ['#ff4d8d','#ff80ab','#ffd700','#00e676','#b039d4','#ffffff','#ff1744'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 45; i++) {
    const p   = document.createElement('div');
    p.className = 'particle';
    const ang = Math.random() * Math.PI * 2;
    const d   = 120 + Math.random() * 320;
    p.style.cssText = `
      left:${cx}px;top:${cy}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;
      border-radius:${Math.random()>0.4?'50%':'3px'};
      --tx:${Math.cos(ang)*d}px;--ty:${Math.sin(ang)*d}px;
      animation-duration:${0.8+Math.random()*0.7}s;
      animation-delay:${Math.random()*0.15}s;
    `;
    container.appendChild(p);
    setTimeout(() => p.remove(), 1600);
  }
}

async function returnToPacks() {
  await refreshProfile();
  setNewHTML('cardsOpening');
}

window.triggerPackOpen = triggerPackOpen;
window.revealTopCard   = revealTopCard;
window.returnToPacks   = returnToPacks;
</script>
