<!-- PROBABILITÉS -->
<div class="page-header">
  <div>
    <div class="page-title">📊 Probabilités</div>
    <div class="page-subtitle">Proba finale = proba piment × multiplicateur couleur</div>
  </div>
</div>

<div id="probaContent">
  <div class="loading-cards"><div class="spinner"></div></div>
</div>

<script>
(async function () {
  const container = document.getElementById('probaContent');
  const cartes    = await getAllCartes();
  const versions  = await getAllVersions();

  if (!cartes.length) {
    container.innerHTML = '<div class="error-page"><p>Impossible de charger les données.</p></div>';
    return;
  }

  const vColors = { vert:'#00e676', jaune:'#ffd700', rouge:'#ff1744', noir:'#ce93d8' };

  // Table piments
  let html = `
    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--pink-light)">
      🌶️ Piments — Probabilité de base
    </h3>
    <table class="proba-table" style="margin-bottom:28px">
      <thead><tr>
        <th>Piment</th>
        <th>Scoville</th>
        <th>Proba</th>
        <th style="width:140px">Fréquence</th>
      </tr></thead>
      <tbody>
        ${cartes.map(c => {
          const pct = (parseFloat(c.proba) * 100).toFixed(0);
          return `<tr>
            <td style="font-weight:700">${c.name}</td>
            <td style="color:var(--text-sub)">${c.scoville.toLocaleString('fr-FR')}</td>
            <td><strong>${pct}%</strong></td>
            <td>
              <div class="proba-bar-bg">
                <div class="proba-bar" style="width:${pct}%"></div>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--pink-light)">
      🎨 Couleurs — Multiplicateur de probabilité
    </h3>
    <table class="proba-table" style="margin-bottom:28px">
      <thead><tr>
        <th>Couleur</th>
        <th>Multiplicateur</th>
        <th style="width:140px">Fréquence</th>
      </tr></thead>
      <tbody>
        ${versions.map(v => {
          const pct = (parseFloat(v.proba_mult) * 100).toFixed(0);
          return `<tr>
            <td style="font-weight:700;color:${vColors[v.color]}">${v.emoji} ${v.label}</td>
            <td><strong>×${parseFloat(v.proba_mult).toFixed(2)}</strong></td>
            <td>
              <div class="proba-bar-bg">
                <div class="proba-bar" style="width:${pct}%;background:${vColors[v.color]}"></div>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--pink-light)">
      🎴 Toutes les combinaisons (proba = piment × couleur)
    </h3>
    <table class="proba-table">
      <thead><tr>
        <th>Carte</th>
        <th>Couleur</th>
        <th>Proba</th>
      </tr></thead>
      <tbody>
        ${cartes.flatMap(c =>
          versions.map(v => {
            const p = (parseFloat(c.proba) * parseFloat(v.proba_mult) * 100).toFixed(2);
            return { name: c.name, version: v, proba: parseFloat(p) };
          })
        ).sort((a, b) => b.proba - a.proba).map(row => `
          <tr>
            <td style="font-weight:600">${row.name}</td>
            <td style="color:${vColors[row.version.color]}">${row.version.emoji} ${row.version.label}</td>
            <td>${row.proba.toFixed(2)}%</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;

  container.innerHTML = html;
})();
</script>
